version: '3.9'

services:
  mongo:
    image: mongo:6
    container_name: ems-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ems-network

  backend:
    build: ./Employee-Management-Backend-MERN
    container_name: ems-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./Employee-Management-Backend-MERN/.env
    depends_on:
      - mongo
    networks:
      - ems-network

  frontend:
    build: ./employee-frontend
    container_name: ems-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ems-network

volumes:
  mongo-data:

networks:
  ems-network:
